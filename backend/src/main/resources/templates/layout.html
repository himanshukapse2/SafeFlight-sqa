<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle!=null?pageTitle+' | SafeFlight':'SafeFlight — FlightBookingSystem'}">SafeFlight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/layout.css" />
</head>

<body>
    <nav class="sf-nav" sec:authorize="isAuthenticated()">
        <div class="sf-nav-inner">
            <a  th:href="@{/}">
                SafeFlight
            </a>

            <button class="sf-nav-toggle" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span></span>
            </button>

            <div  id="navbarNav">
                <ul >
                    <li >
                        <a  th:href="@{/}">Search Flights</a>
                    </li>

                    <li >
                        <a  th:href="@{/bookings/my}">My Bookings</a>
                    </li>
                </ul>

                <ul >
                    <li >
                        <span >
                            <span sec:authentication="principal.username">User</span>
                        </span>
                    </li>

                    <li >
                        <form th:action="@{/logout}" method="post" >
                            <button type="submit" >
                                Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main-container">

        <div th:if="${successMessage}" class="alert-success" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="alert-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert-error" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="alert-close" data-bs-dismiss="alert"></button>
        </div>

        <div layout:fragment="content"></div>
    </main>

</body>

</html>
