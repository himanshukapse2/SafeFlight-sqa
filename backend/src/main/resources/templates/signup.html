<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | SafeFlight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card shadow-lg">
            <div class="text-center mb-4">
                <i class="bi  auth-logo"></i>
                <h2 class="fw-bold mt-2">Create Account</h2>
                <p class="text-muted">Join SafeFlight today</p>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger alert-sm">
                <i class="bi  me-1"></i><span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/signup}" method="post" th:object="${signupRequest}">
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi "></i></span>
                        <input type="text" class="form-control" id="name" th:field="*{name}"
                            th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" placeholder="Username"
                            required>
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('name')}" th:errors="*{name}">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi "></i></span>
                        <input type="email" class="form-control" id="email" th:field="*{email}"
                            th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" placeholder="you@example.com"
                            required>
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}">
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi "></i></span>
                        <input type="password" class="form-control" id="password" th:field="*{password}"
                            th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                            placeholder="Min 6 characters" required>
                    </div>
                    <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('password')}"
                        th:errors="*{password}"></div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi  me-1"></i>Create Account
                </button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">Already have an account?</span>
                <a th:href="@{/login}" class="fw-semibold text-decoration-none"> Sign In</a>
            </div>
        </div>
    </div>
</body>

</html>
