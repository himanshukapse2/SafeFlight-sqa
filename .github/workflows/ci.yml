name: CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: ./mvnw clean verify

      - name: Run mutation tests
        run: ./mvnw org.pitest:pitest-maven:mutationCoverage

      - name: Upload PIT report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pitest-report
          path: backend/target/pit-reports/

      - name: Sonar analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw sonar:sonar -Dsonar.qualitygate.wait=false