<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SafeFlight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card shadow-lg">
            <div class="text-center mb-4">
                <i class="bi  auth-logo"></i>
                <h2 class="fw-bold mt-2">SafeFlight</h2>
                <p class="text-muted">Sign in to your account</p>
            </div>

            <div th:if="${param.logout}" class="alert alert-info alert-sm">
                <i class="bi  me-1"></i>You have been logged out successfully.
            </div>
            <div th:if="${param.error}" class="alert alert-danger alert-sm">
                <i class="bi  me-1"></i>Invalid email or password.
            </div>
            <div th:if="${successMessage}" class="alert alert-success alert-sm">
                <i class="bi  me-1"></i><span th:text="${successMessage}"></span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi "></i></span>
                        <input type="email" class="form-control" id="username" name="username"
                            placeholder="you@example.com" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi "></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                            placeholder="Enter your password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                    <i class="bi  me-1"></i>Sign In
                </button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted">Don't have an account?</span>
                <a th:href="@{/signup}" class="fw-semibold text-decoration-none"> Sign Up</a>
            </div>
        </div>
    </div>
</body>

</html>
