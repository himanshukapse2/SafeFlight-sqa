<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results | SafeFlight</title>

</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">
                SafeFlight
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}">SearchFlights</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/bookings/my}">MyBookings</a></li>
                </ul>

                <ul class="navbar-nav">
                    <li class="nav-item">
                        <span class="nav-link text-light"><span
                                sec:authentication="principal.username">User</span></span>
                    </li>

                    <li class="nav-item">
                        <form th:action="@{/logout}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-outline-light btn-sm ms-2">Logout</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>

                <h3 class="fw-bold">
                    <span th:text="${fromCity}">From</span>
                    <i class="bi bi-arrow-right mx-2 text-muted"></i>
                    <span th:text="${toCity}">To</span>
                </h3>

                <p class="text-muted mb-0">
                    <span th:text="${#temporals.format(searchDate,'EEEE,ddMMMyyy')}">Date</span>
                    &nbsp;|&nbsp;
                    <span th:text="${#lists.size(flights)+' flights found'}">0flights</span>
                </p>
            </div>

            <a th:href="@{/}" class="btn btn-outline-primary">
                NewSearch
            </a>
        </div>

        <div th:if="${#lists.isEmpty(flights)}" class="text-center py-5">
            <h4 class="mt-3 text-muted">Noflightsfoundforthisrouteanddate</h4>
            <a th:href="@{/}" class="btn btn-primary mt-3">TryAnotherSearch</a>
        </div>

        <div th:unless="${#lists.isEmpty(flights)}" class="row g-3">

            <div th:each="flight:${flights}" class="col-12">
                <div class="card shadow-sm border-0 flight-card">
                    <div class="card-body p-4">
                        <div class="row align-items-center">

                            <div class="col-md-2">
                                <span class="badge  text-dark fs-6" th:text="${flight.airline}">Airline</span>
                                <br>
                                <small class="text-muted" th:text="${flight.flightNumber}">FL001</small>
                            </div>

                            <div class="col-md-3 text-center">
                                <h5 class="mb-0 fw-bold" th:text="${flight.departureTime}">10:00</h5>
                                <small class="text-muted" th:text="${flight.fromCity}">From</small>
                            </div>

                            <div class="col-md-2 text-center">
                                <div class="flight-line"></div>
                                <small class="text-muted"
                                    th:text="${flight.domestic?'Domestic':'International'}">Type</small>
                            </div>

                            <div class="col-md-3 text-center">
                                <h5 class="mb-0 fw-bold" th:text="${flight.arrivalTime}">12:00</h5>
                                <small class="text-muted" th:text="${flight.toCity}">To</small>
                            </div>

                            <div class="col-md-2 text-end">
                                <h4 class="text-primary fw-bold mb-1">
                                    ₹<span th:text="${#numbers.formatDecimal(flight.basePrice,0,0)}">5000</span>
                                </h4>

                                <small class="text-muted" th:text="${flight.availableSeats+' seats left'}">10seats</small>
                                <br>

                                <a th:href="@{/bookings/book/{id}(id=${flight.id})}" class="btn btn-primary btn-sm mt-2"
                                    th:classappend="${flight.availableSeats<=0}?'disabled':'">
                                    BookNow
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        var btns=document.querySelectorAll('.btn-primary');
        console.log('Found '+btns.length+' buttons');

        btns.forEach(function(btn){
            btn.addEventListener('click',function(){
                console.log('Button clicked');
            });
        });
    </script>
</body>

</html>
