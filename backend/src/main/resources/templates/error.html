<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | SafeFlight</title>
    <link rel="stylesheet" href="/css/error.css" />
</head>

<body>
    <div class="main-container">
        <div class="glass-box">

            <h3 class="error-title" th:text="${errorTitle?: 'Oops!'}">Error</h3>
            <p class="error-message" th:text="${errorMessage?:'Something went wrong. Please try again.'}">Error description</p>

            <a th:href="@{/}" class="button">
                Back to Home
            </a>
        </div>
    </div>
</body>

</html>
