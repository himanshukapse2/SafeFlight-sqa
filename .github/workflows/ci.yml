name: CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: "pages-report"
  cancel-in-progress: true

jobs:
  build-test-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and Analyze (Sonar)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw clean verify sonar:sonar -Dsonar.qualitygate.wait=false

      # --- SNYK SECURITY SCAN START ---
      - name: Install Snyk & Snyk-to-HTML
        run: |
          npm install -g snyk snyk-to-html

      - name: Run Snyk Dependency Scan (HTML Report)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --json | snyk-to-html -o snyk-report.html
        continue-on-error: true

      - name: Run Snyk Scan (SARIF for GitHub Security Dashboard)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk test --sarif-file-output=snyk.sarif
        continue-on-error: true

      - name: Upload SARIF to GitHub Security Tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: backend/snyk.sarif

      # --- PIT REPORT START ---
      - name: Run mutation tests (PIT)
        run: ./mvnw org.pitest:pitest-maven:mutationCoverage

      - name: Prepare Pages content
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p ../pages/pit-report
          cp -R target/pit-reports/. ../pages/pit-report/
          cp snyk-report.html ../pages/dependency-scan.html
          touch ../pages/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: build-test-security
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4