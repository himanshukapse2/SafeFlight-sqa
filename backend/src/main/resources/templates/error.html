<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | SafeFlight</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card shadow-lg text-center">
            <i class="bi  display-1 text-danger"></i>
            <h3 class="fw-bold mt-3" th:text="${errorTitle ?: 'Oops!'}">Error</h3>
            <p class="text-muted" th:text="${errorMessage ?: 'Something went wrong. Please try again.'}">Error
                description</p>
            <a th:href="@{/}" class="btn btn-primary mt-3">
                <i class="bi bi-house me-1"></i>Back to Home
            </a>
        </div>
    </div>
</body>

</html>
