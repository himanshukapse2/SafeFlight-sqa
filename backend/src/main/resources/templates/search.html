<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Flights | SafeFlight</title>
    <link rel="stylesheet" href="/css/search.css" />

</head>

<body>
     <div class="main-container">
        <div class="glass-box">

            <div id="navbarNav">

                <div id="text-1" >
                    <span sec:authentication="principal.username">User</span>
                </div>

                <form th:action="@{/logout}" method="post">
                            <button type="submit" id="logout-button">
                                Log Out
                            </button>
                </form>

            </div>

            <div >
                <h2 id="title">SafeFlight</h2>
            </div>
        
            <div id="navlink">
                        <a th:href="@{/}" style="color:#256fe6;text-decoration:none;font-weight:600;">Search Flights</a>  |  
                        <a th:href="@{/bookings/my}" style="color:#256fe6;text-decoration:none;font-weight:600;">My Bookings</a>
            </div>

        <div>
            <h1 id="text-3">Find Your Perfect Flight !</h1>
            <p>Search from hundreds of flights across domestic and international routes.</p>
        </div>

        <div>
            <div>
                <div>

                    <div>
                        <form action="/flights/search" method="get">
                            <div style="margin-bottom: 1.5rem; display: flex; gap: 1.5rem; align-items: center; justify-content: center;">
                                <label style="font-weight: bold; cursor: pointer;">
                                    <input type="radio" name="tripType" value="oneWay" th:checked="${tripType == null || tripType == 'oneWay'}" onclick="toggleReturnDate(false)" style="margin-right: 0.5rem;" required> One Way
                                </label>
                                <label style="font-weight: bold; cursor: pointer;">
                                    <input type="radio" name="tripType" value="roundTrip" th:checked="${tripType == 'roundTrip'}" onclick="toggleReturnDate(true)" style="margin-right: 0.5rem;" required> Round Trip
                                </label>
                            </div>
                            <div>
                                <div>
                                    <label class="label" for="fromCity">
                                        From City
                                    </label>
                                    <input type="text" id="fromCity"
                                        name="fromCity" placeholder="e.g. Delhi" th:value="${fromCity}"
                                        required>
                                </div>

                                <div>
                                    <label class="label" for="toCity">
                                        To City
                                    </label>
                                    <input type="text" id="toCity" name="toCity"
                                        placeholder="e.g. Mumbai" th:value="${toCity}"
                                        required>
                                </div>

                                <div>
                                    <label class="label" for="date">
                                        Travel Date
                                    </label>
                                    <input type="date" id="date" name="date"
                                        th:attr="min=${minDate}"
                                        th:value="${dateValue}"
                                        required>

                                    <!-- Inline server-side validation message -->
                                    <div th:if="${dateError}" style="color: #b00020; margin-top: 0.5rem;">
                                        <small th:text="${dateError}"></small>
                                    </div>
                                </div>

                                <div>
                                    <label class="label" for="returnDate">
                                        Return Date
                                    </label>
                                    <input type="date" id="returnDate" name="returnDate"
                                        th:attr="min=${minDate}"
                                        th:value="${returnDateValue}"
                                        th:disabled="${tripType == null || tripType == 'oneWay'}">
                                </div>
                            </div>

                            <div>
                                <button id="search-button" type="submit">
                                    Search
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </div>

    <script>
        function toggleReturnDate(show) {
            const returnDateInput = document.getElementById('returnDate');
            returnDateInput.disabled = !show;
            if (show) {
                returnDateInput.required = true;
                // auto set min to outbound departure date if selected
                const depDate = document.getElementById('date').value;
                if (depDate) {
                    returnDateInput.min = depDate;
                }
            } else {
                returnDateInput.required = false;
                returnDateInput.value = '';
            }
        }

        document.getElementById('date').addEventListener('change', function(e) {
             const returnDateInput = document.getElementById('returnDate');
             if (e.target.value) {
                 returnDateInput.min = e.target.value;
                 if (returnDateInput.value && returnDateInput.value < e.target.value) {
                     returnDateInput.value = e.target.value;
                 }
             }
        });
    </script>
</body>

</html>
