name: CI Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write

concurrency:
  group: "pages-report"
  cancel-in-progress: true

jobs:
  build-test-sonar:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and Analyze (Sonar)
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw clean verify sonar:sonar -Dsonar.qualitygate.wait=false

      # --- SNYK SECURITY SCAN START ---
      - name: Install Snyk & Snyk-to-HTML
        run: npm install -g snyk snyk-to-html

      - name: Run Snyk Dependency Scan (HTML Report)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          snyk test --json | snyk-to-html -o snyk-report.html || echo "Snyk HTML generation failed"
          snyk test --sarif-file-output=snyk.sarif || echo "Snyk SARIF generation failed"

      - name: Check if SARIF exists for Dashboard
        id: check_sarif
        run: |
          if [ -f snyk.sarif ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload SARIF to GitHub Security Tab
        if: steps.check_sarif.outputs.exists == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: backend/snyk.sarif
      # --- SNYK SECURITY SCAN END ---

      - name: Run mutation tests (PIT)
        run: ./mvnw org.pitest:pitest-maven:mutationCoverage

      - name: Prepare Pages content
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p ../pages/pit-report
          mkdir -p ../pages/jacoco-report
          
          # 1. JaCoCo Copy (As per your local path: target/site/jacoco)
          if [ -d target/site/jacoco ]; then
            cp -R target/site/jacoco/. ../pages/jacoco-report/
          fi
          
          # 2. PIT Report Copy (Wildcard for timestamp folder)
          if [ -d target/pit-reports ]; then
            cp -R target/pit-reports/*/. ../pages/pit-report/
          fi
          
          # 3. Snyk HTML Copy
          if [ -f snyk-report.html ]; then
            cp snyk-report.html ../pages/dependency-scan.html
          fi
          
          touch ../pages/.nojekyll

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/master'
    needs: build-test-sonar
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4